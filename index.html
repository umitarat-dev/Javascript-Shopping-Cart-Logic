<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS Links -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/universal.css">
    

    <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">


    <!-- Fontawesome Kit -->
    <!-- <script src="https://kit.fontawesome.com/f3876d5d9f.js" crossorigin="anonymous"></script> -->


    <!-- Bootstrap 3.3.7 (Yeni sürümlerdejquery'e gerek yok.) -->
    <!-- <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"> -->
    
    <!-- <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script> -->
    
    <!-- <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>   -->
    

    <title>Shopping Cart | UmitDev JS Logic</title>
</head>
<body>
    
    <h1 id="checkout-title">Checkout</h1>
    
    <main>
        <div id="products-preview">

            <div id="product-painel">

                <div class="products">
                    
                    <div class="product">
                        <img src="img/photo1.png" alt="">
                        <div class="product-info">
                            <h2>Vintage Backbag</h2>
                            <div class="product-price">
                                <p>
                                    <strong>25.98</strong>
                                    <span class="line-through">34.99</span>
                                </p>
                            </div>
                            <div class="quantity-controller">
                                <span class="minus">-</span>
                                <p id="product-quantity">1</p>
                                <span class="plus">+</span>
                            </div>
                            <div class="product-removal">
                                <button class="remove-product">Remove</button>
                            </div>
                            <div class="product-line-price">25.98</div>
                        </div>
                    </div>

                    <div class="product">
                        <img src="img/photo2.png" alt="">
                        <div class="product-info">
                            <h2>Levi Shoes</h2>
                            <div class="product-price">
                                <p>
                                    <strong>45.99</strong>
                                    <span class="line-through">54.99</span>
                                </p>
                            </div>
                            <div class="quantity-controller">
                                <span class="minus">-</span>
                                <p id="product-quantity">1</p>
                                <span class="plus">+</span>
                            </div>
                            <div class="product-removal">
                                <button class="remove-product">Remove</button>
                            </div>
                            <div class="product-line-price">45.99</div>
                        </div>
                    </div>

                    <div class="product">
                        <img src="img/photo3.jpg" alt="">
                        <div class="product-info">
                            <h2>Antique Clock</h2>
                            <div class="product-price">
                                <p>
                                    <strong>74.99</strong>
                                    <span class="line-through">94.99</span>
                                </p>
                            </div>
                            <div class="quantity-controller">
                                <span class="minus">-</span>
                                <p id="product-quantity">1</p>
                                <span class="plus">+</span>
                            </div>
                            <div class="product-removal">
                                <button class="remove-product">Remove</button>
                            </div>
                            <div class="product-line-price">74.99</div>
                        </div>
                    </div>

                </div>
                <div class="buy-detail" id="card-subtotal">
                    <p>Subtotal</p>
                    <p>0</p>
                </div>
                <div class="buy-detail" id="card-tax">
                    <p>Tax(%18)</p>
                    <p>0</p>
                </div>
                <div class="buy-detail" id="card-shipping">
                    <p>Shipping</p>
                    <p>0</p>
                </div>
                <div class="buy-detail" id="card-total">
                    <p>Total</p>
                    <p>0</p>
                </div>

            </div>

        </div>

    </main>

    <script src="app.js"></script>

</body>
</html>
